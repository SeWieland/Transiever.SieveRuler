protocols = sieve
listen = *

ssl = required
ssl_cert = </etc/dovecot/private/srtx-test.crt
ssl_key = </etc/dovecot/private/srtx-test.key

auth_mechanisms = plain
disable_plaintext_auth = yes

passdb {
    driver = static
    args = password=srtx-password
}

userdb {
    driver = static
    args = uid=vmail gid=vmail home=/srv/mail/%u
}

mail_home = /srv/mail/%u
mail_location = maildir:~/Maildir

service managesieve-login {
    inet_listener sieve {
        port = 4190
    }
}

protocol sieve {
    managesieve_max_line_length = 65536
}

plugin {
    sieve = ~/sieve/.dovecot.sieve
    sieve_dir = ~/sieve
}
