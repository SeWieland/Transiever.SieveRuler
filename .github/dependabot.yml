version: 2

updates:
  - package-ecosystem: nuget
    directories:
      - /src/Transiever.SieveRuler
      - /src/Transiever.SieveRuler.Cli
    schedule:
      interval: daily
      time: '08:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1
      exclude:
        - Transiever.*
    commit-message:
      prefix: chore(deps)
    groups:
      transiever-dependencies:
        patterns:
          - Transiever.*
        update-types:
          - patch
          - minor
      major-dependencies:
        patterns:
          - '*'
        update-types:
          - major

  - package-ecosystem: nuget
    directories:
      - /src/Transiever.SieveRuler.UnitTest
      - /src/Transiever.SieveRuler.Cli.UnitTest
      - /src/Transiever.SieveRuler.IntegrationTest
    schedule:
      interval: daily
      time: '08:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1
    commit-message:
      prefix: chore(deps-ci)
    groups:
      test-dependencies:
        patterns:
          - '*'
        update-types:
          - patch
          - minor
      test-major-dependencies:
        patterns:
          - '*'
        update-types:
          - major

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: '08:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1
    commit-message:
      prefix: chore(deps-ci)
    ignore:
      # Keep v9 until https://github.com/semantic-release/release-notes-generator/issues/992
      # is fixed in a release-notes-generator release.
      - dependency-name: conventional-changelog-conventionalcommits
        update-types:
          - version-update:semver-major
    groups:
      release-tooling:
        dependency-type: development
        update-types:
          - patch
          - minor
      major-dependencies:
        patterns:
          - '*'
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '08:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    cooldown:
      default-days: 1
    commit-message:
      prefix: chore(deps-ci)
    groups:
      actions-minor-patch:
        update-types:
          - patch
          - minor
      actions-major:
        update-types:
          - major
