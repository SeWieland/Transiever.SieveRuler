name: PR title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]' || startsWith(github.event.pull_request.title, 'chore(deps):')

    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: false
