name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing draft release tag whose assets should be rebuilt
        required: false
        type: string
  schedule:
    - cron: '0 18 * * 2'
      timezone: Europe/Berlin

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    if: >-
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') &&
      (github.event_name != 'workflow_dispatch' || inputs.release_tag == '')
    environment: release
    outputs:
      release_tag: ${{ steps.semantic-release.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install release dependencies
        run: npm ci

      - name: Restore
        run: dotnet restore Transiever.SieveRuler.slnx

      - name: Build
        run: dotnet build Transiever.SieveRuler.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Transiever.SieveRuler.slnx --configuration Release --no-build

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: npx semantic-release

  select-tag:
    name: Select release tag
    runs-on: ubuntu-latest
    needs: release
    if: >-
      always() &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    outputs:
      release_tag: ${{ steps.select.outputs.release_tag }}

    steps:
      - name: Select tag
        id: select
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
          RELEASED_TAG: ${{ needs.release.outputs.release_tag }}
        run: |
          release_tag="${REQUESTED_TAG:-$RELEASED_TAG}"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  build-assets:
    name: Build ${{ matrix.rid }} asset
    needs: select-tag
    if: needs.select-tag.outputs.release_tag != ''
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            extension: zip
          - os: windows-latest
            rid: win-x86
            extension: zip
          - os: ubuntu-latest
            rid: linux-x64
            extension: tar.gz

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.select-tag.outputs.release_tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Install Linux Native AOT prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang zlib1g-dev

      - name: Build release asset
        run: >-
          bash .github/scripts/build-release-assets.sh
          "${{ needs.select-tag.outputs.release_tag }}"
          "${{ matrix.rid }}"

      - name: Smoke test Windows executable
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./artifacts/publish/${{ matrix.rid }}/srtx.exe --help

      - name: Smoke test Linux executable
        if: matrix.os == 'ubuntu-latest'
        run: ./artifacts/publish/${{ matrix.rid }}/srtx --help

      - name: Smoke test Linux JSON commands
        if: matrix.os == 'ubuntu-latest'
        run: |
          smoke_directory="$(mktemp -d)"
          rules="$smoke_directory/rules.json"
          printf '%s\n' '{"$schema":"urn:sieveruler:rules:v1","schemaVersion":1,"sourceId":"smoke","rules":[],"diagnostics":[]}' > "$rules"
          executable="./artifacts/publish/${{ matrix.rid }}/srtx"
          "$executable" inspect --rules "$rules"
          "$executable" optimize conservative --rules "$rules" --output "$smoke_directory/optimized.json"
          "$executable" generate --rules "$rules" --sieve "$smoke_directory/rules.sieve"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/srtx-${{ needs.select-tag.outputs.release_tag }}-${{ matrix.rid }}.${{ matrix.extension }}
          if-no-files-found: error
          retention-days: 1

  attach-assets:
    name: Attach release assets
    runs-on: ubuntu-latest
    needs: [select-tag, build-assets]
    if: >-
      needs.select-tag.outputs.release_tag != '' &&
      needs.build-assets.result == 'success'

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Attach assets and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.select-tag.outputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" artifacts/* --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit "$RELEASE_TAG" --draft=false --repo "$GITHUB_REPOSITORY"
